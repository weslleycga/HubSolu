<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Hubcontrole - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>


<script src="js/tailwind.config.js"></script></head>
<body class="bg-[#0B0E11] text-on-surface font-body min-h-screen flex flex-col">
<!-- TopNavBar (Suppressed nav links for onboarding/transactional flow, keeping brand and back action) -->
<header class="bg-[#0B0E11] text-white flex justify-between items-center px-6 py-4 w-full max-w-full mx-auto">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-purple-500" style="font-variation-settings: 'FILL' 1;">bolt</span>
<span class="font-headline text-2xl font-black bg-gradient-to-r from-purple-500 to-blue-500 bg-clip-text text-transparent tracking-tight">Hubcontrole</span>
</div>
<div>
<a class="text-zinc-400 hover:text-white transition-colors flex items-center gap-1 font-medium" href="#">
<span class="material-symbols-outlined text-sm">arrow_back</span>
                Voltar
            </a>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center p-6 pb-24">
<!-- Progress Bar -->
<div class="w-full max-w-md mb-8 flex items-center justify-between relative">
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-full h-1 bg-zinc-800 rounded-full z-0"></div>
<div class="absolute left-0 top-1/2 -translate-y-1/2 w-1/2 h-1 bg-purple-500 rounded-full z-0"></div>
<div class="w-8 h-8 rounded-full bg-green-500 flex items-center justify-center z-10 text-white relative">
<span class="material-symbols-outlined text-sm font-bold">check</span>
</div>
<div class="w-8 h-8 rounded-full bg-purple-600 flex items-center justify-center z-10 text-white ring-4 ring-[#0B0E11] relative">
<span class="font-bold text-sm">2</span>
</div>
<div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center z-10 text-zinc-500 relative">
<span class="font-bold text-sm">3</span>
</div>
</div>
<!-- Central Card -->
<div class="w-full max-w-2xl bg-zinc-900/50 backdrop-blur-sm rounded-xl p-8 border border-zinc-800/50">
<div class="text-center mb-10">
<h1 class="font-headline text-3xl font-bold text-white mb-2">Qual é seu negócio?</h1>
<p class="text-zinc-400 font-body">Isso nos ajuda a personalizar sua experiência.</p>
</div>
<!-- Options Grid -->
<div id="optionsGrid" class="grid grid-cols-2 gap-4 mb-10">
<!-- Option 1 -->
<button class="bg-zinc-800/80 hover:bg-zinc-700 hover:border-purple-500/50 border border-transparent transition-all duration-300 rounded-xl p-6 flex flex-col items-center justify-center gap-3 group">
<span class="material-symbols-outlined text-3xl text-zinc-400 group-hover:text-purple-400 transition-colors">local_shipping</span>
<span class="text-white font-medium text-sm">Food Truck</span>
</button>
<!-- Option 2 -->
<button class="bg-zinc-800/80 hover:bg-zinc-700 hover:border-purple-500/50 border border-transparent transition-all duration-300 rounded-xl p-6 flex flex-col items-center justify-center gap-3 group">
<span class="material-symbols-outlined text-3xl text-zinc-400 group-hover:text-purple-400 transition-colors">restaurant</span>
<span class="text-white font-medium text-sm">Restaurante</span>
</button>
<!-- Option 3 -->
<button class="bg-zinc-800/80 hover:bg-zinc-700 hover:border-purple-500/50 border border-transparent transition-all duration-300 rounded-xl p-6 flex flex-col items-center justify-center gap-3 group">
<span class="material-symbols-outlined text-3xl text-zinc-400 group-hover:text-purple-400 transition-colors">liquor</span>
<span class="text-white font-medium text-sm">Depósito de Bebidas</span>
</button>
<!-- Option 4 -->
<button class="bg-zinc-800/80 hover:bg-zinc-700 hover:border-purple-500/50 border border-transparent transition-all duration-300 rounded-xl p-6 flex flex-col items-center justify-center gap-3 group">
<span class="material-symbols-outlined text-3xl text-zinc-400 group-hover:text-purple-400 transition-colors">local_cafe</span>
<span class="text-white font-medium text-sm">Café</span>
</button>
<!-- Option 5 -->
<button class="bg-zinc-800/80 hover:bg-zinc-700 hover:border-purple-500/50 border border-transparent transition-all duration-300 rounded-xl p-6 flex flex-col items-center justify-center gap-3 group">
<span class="material-symbols-outlined text-3xl text-zinc-400 group-hover:text-purple-400 transition-colors">storefront</span>
<span class="text-white font-medium text-sm">Comércio Informal</span>
</button>
<!-- Option 6 -->
<button class="bg-zinc-800/80 hover:bg-zinc-700 hover:border-purple-500/50 border border-transparent transition-all duration-300 rounded-xl p-6 flex flex-col items-center justify-center gap-3 group">
<span class="material-symbols-outlined text-3xl text-zinc-400 group-hover:text-purple-400 transition-colors">more_horiz</span>
<span class="text-white font-medium text-sm">Outro</span>
</button>
</div>
<!-- Action Button -->
<button id="btnContinuar" disabled class="w-full bg-gradient-to-r from-purple-600 to-blue-500 hover:from-purple-500 hover:to-blue-400 text-white rounded-full py-4 px-6 font-bold text-lg flex items-center justify-center gap-2 transition-all duration-300 transform hover:-translate-y-0.5 shadow-lg shadow-purple-500/20 opacity-50 cursor-not-allowed">
                Continuar
                <span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</div>
</main>

<script>
    const optionsGrid = document.getElementById('optionsGrid');
    const btnContinuar = document.getElementById('btnContinuar');
    let selectedOption = null;

    if (optionsGrid) {
        const buttons = optionsGrid.querySelectorAll('button');
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                // Reset all
                buttons.forEach(b => {
                    b.classList.remove('border-purple-500', 'bg-zinc-700');
                    b.classList.add('border-transparent');
                    const icon = b.querySelector('.material-symbols-outlined');
                    if (icon) {
                        icon.classList.remove('text-purple-400');
                        icon.classList.add('text-zinc-400');
                    }
                });
                // Set active
                btn.classList.remove('border-transparent');
                btn.classList.add('border-purple-500', 'bg-zinc-700');
                const activeIcon = btn.querySelector('.material-symbols-outlined');
                if (activeIcon) {
                    activeIcon.classList.remove('text-zinc-400');
                    activeIcon.classList.add('text-purple-400');
                }
                selectedOption = btn;

                // Enable button
                btnContinuar.classList.remove('opacity-50', 'cursor-not-allowed');
                btnContinuar.removeAttribute('disabled');
            });
        });
    }

    if (btnContinuar) {
        btnContinuar.addEventListener('click', () => {
            if (selectedOption) {
                window.location.href = 'escolha_plano.html';
            }
        });
    }
</script>
</body></html>
