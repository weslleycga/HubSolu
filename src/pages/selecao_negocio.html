<!doctype html>

<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Hubcontrole - Onboarding</title>
    <link rel="stylesheet" href="/src/css/main.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="flex min-h-screen flex-col bg-[#0B0E11] font-body text-on-surface">
    <!-- TopNavBar (Suppressed nav links for onboarding/transactional flow, keeping brand and back action) -->
    <header
      class="mx-auto flex w-full max-w-full items-center justify-between bg-[#0B0E11] px-6 py-4 text-white"
    >
      <div class="flex items-center gap-2">
        <span
          class="material-symbols-outlined text-purple-500"
          style="font-variation-settings: 'FILL' 1"
          >bolt</span
        >
        <span
          class="bg-gradient-to-r from-purple-500 to-blue-500 bg-clip-text font-headline text-2xl font-black tracking-tight text-transparent"
          >Hubcontrole</span
        >
      </div>
      <div>
        <a
          class="flex items-center gap-1 font-medium text-zinc-400 transition-colors hover:text-white"
          href="#"
        >
          <span class="material-symbols-outlined text-sm">arrow_back</span>
          Voltar
        </a>
      </div>
    </header>
    <main class="flex flex-grow flex-col items-center justify-center p-6 pb-24">
      <!-- Progress Bar -->
      <div class="relative mb-8 flex w-full max-w-md items-center justify-between">
        <div
          class="absolute left-0 top-1/2 z-0 h-1 w-full -translate-y-1/2 rounded-full bg-zinc-800"
        ></div>
        <div
          class="absolute left-0 top-1/2 z-0 h-1 w-1/2 -translate-y-1/2 rounded-full bg-purple-500"
        ></div>
        <div
          class="relative z-10 flex h-8 w-8 items-center justify-center rounded-full bg-green-500 text-white"
        >
          <span class="material-symbols-outlined text-sm font-bold">check</span>
        </div>
        <div
          class="relative z-10 flex h-8 w-8 items-center justify-center rounded-full bg-purple-600 text-white ring-4 ring-[#0B0E11]"
        >
          <span class="text-sm font-bold">2</span>
        </div>
        <div
          class="relative z-10 flex h-8 w-8 items-center justify-center rounded-full bg-zinc-800 text-zinc-500"
        >
          <span class="text-sm font-bold">3</span>
        </div>
      </div>
      <!-- Central Card -->
      <div
        class="w-full max-w-2xl rounded-xl border border-zinc-800/50 bg-zinc-900/50 p-8 backdrop-blur-sm"
      >
        <div class="mb-10 text-center">
          <h1 class="mb-2 font-headline text-3xl font-bold text-white">Qual é seu negócio?</h1>
          <p class="font-body text-zinc-400">Isso nos ajuda a personalizar sua experiência.</p>
        </div>
        <!-- Options Grid -->
        <div id="optionsGrid" class="mb-10 grid grid-cols-2 gap-4">
          <!-- Option 1 -->
          <button
            class="group flex flex-col items-center justify-center gap-3 rounded-xl border border-transparent bg-zinc-800/80 p-6 transition-all duration-300 hover:border-purple-500/50 hover:bg-zinc-700"
          >
            <span
              class="material-symbols-outlined text-3xl text-zinc-400 transition-colors group-hover:text-purple-400"
              >local_shipping</span
            >
            <span class="text-sm font-medium text-white">Food Truck</span>
          </button>
          <!-- Option 2 -->
          <button
            class="group flex flex-col items-center justify-center gap-3 rounded-xl border border-transparent bg-zinc-800/80 p-6 transition-all duration-300 hover:border-purple-500/50 hover:bg-zinc-700"
          >
            <span
              class="material-symbols-outlined text-3xl text-zinc-400 transition-colors group-hover:text-purple-400"
              >restaurant</span
            >
            <span class="text-sm font-medium text-white">Restaurante</span>
          </button>
          <!-- Option 3 -->
          <button
            class="group flex flex-col items-center justify-center gap-3 rounded-xl border border-transparent bg-zinc-800/80 p-6 transition-all duration-300 hover:border-purple-500/50 hover:bg-zinc-700"
          >
            <span
              class="material-symbols-outlined text-3xl text-zinc-400 transition-colors group-hover:text-purple-400"
              >liquor</span
            >
            <span class="text-sm font-medium text-white">Depósito de Bebidas</span>
          </button>
          <!-- Option 4 -->
          <button
            class="group flex flex-col items-center justify-center gap-3 rounded-xl border border-transparent bg-zinc-800/80 p-6 transition-all duration-300 hover:border-purple-500/50 hover:bg-zinc-700"
          >
            <span
              class="material-symbols-outlined text-3xl text-zinc-400 transition-colors group-hover:text-purple-400"
              >local_cafe</span
            >
            <span class="text-sm font-medium text-white">Café</span>
          </button>
          <!-- Option 5 -->
          <button
            class="group flex flex-col items-center justify-center gap-3 rounded-xl border border-transparent bg-zinc-800/80 p-6 transition-all duration-300 hover:border-purple-500/50 hover:bg-zinc-700"
          >
            <span
              class="material-symbols-outlined text-3xl text-zinc-400 transition-colors group-hover:text-purple-400"
              >storefront</span
            >
            <span class="text-sm font-medium text-white">Comércio Informal</span>
          </button>
          <!-- Option 6 -->
          <button
            class="group flex flex-col items-center justify-center gap-3 rounded-xl border border-transparent bg-zinc-800/80 p-6 transition-all duration-300 hover:border-purple-500/50 hover:bg-zinc-700"
          >
            <span
              class="material-symbols-outlined text-3xl text-zinc-400 transition-colors group-hover:text-purple-400"
              >more_horiz</span
            >
            <span class="text-sm font-medium text-white">Outro</span>
          </button>
        </div>
        <!-- Action Button -->
        <button
          id="btnContinuar"
          disabled
          class="flex w-full transform cursor-not-allowed items-center justify-center gap-2 rounded-full bg-gradient-to-r from-purple-600 to-blue-500 px-6 py-4 text-lg font-bold text-white opacity-50 shadow-lg shadow-purple-500/20 transition-all duration-300 hover:-translate-y-0.5 hover:from-purple-500 hover:to-blue-400"
        >
          Continuar
          <span class="material-symbols-outlined text-xl">arrow_forward</span>
        </button>
      </div>
    </main>

    <script>
      const optionsGrid = document.getElementById('optionsGrid');
      const btnContinuar = document.getElementById('btnContinuar');
      let selectedOption = null;

      if (optionsGrid) {
        const buttons = optionsGrid.querySelectorAll('button');
        buttons.forEach((btn) => {
          btn.addEventListener('click', () => {
            // Reset all
            buttons.forEach((b) => {
              b.classList.remove('border-purple-500', 'bg-zinc-700');
              b.classList.add('border-transparent');
              const icon = b.querySelector('.material-symbols-outlined');
              if (icon) {
                icon.classList.remove('text-purple-400');
                icon.classList.add('text-zinc-400');
              }
            });
            // Set active
            btn.classList.remove('border-transparent');
            btn.classList.add('border-purple-500', 'bg-zinc-700');
            const activeIcon = btn.querySelector('.material-symbols-outlined');
            if (activeIcon) {
              activeIcon.classList.remove('text-zinc-400');
              activeIcon.classList.add('text-purple-400');
            }
            selectedOption = btn;

            // Enable button
            btnContinuar.classList.remove('opacity-50', 'cursor-not-allowed');
            btnContinuar.removeAttribute('disabled');
          });
        });
      }

      if (btnContinuar) {
        btnContinuar.addEventListener('click', () => {
          if (selectedOption) {
            window.location.href = 'escolha_plano.html';
          }
        });
      }
    </script>
  </body>
</html>
